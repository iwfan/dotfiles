# https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}" --features=decorations
  pull:
    mode: 'rebase' # one of 'merge' | 'rebase' | 'ff-only'
os:
  edit: 'nvim {{filename}}'
  editAtLine: 'nvim --line={{line}} {{filename}}'
  editAtLineAndWait: 'nvim --block --line={{line}} {{filename}}'
  editInTerminal: true
  openDirInEditor: 'nvim {{dir}}'
  open: zed {{filename}}
